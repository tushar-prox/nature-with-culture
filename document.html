<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program document — Nurture with Culture</title>
<meta name="description" content="Nurture with Culture program document (PDF).">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #E8751A;
    --deep-saffron: #C4591A;
    --deep-navy: #0F1F3D;
    --warm-white: #FFFBF5;
    --text-dark: #1A1208;
    --text-mid: #4A3728;
    --border: rgba(232,117,26,0.18);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-white);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    position: fixed; top: 0; width: 100%; z-index: 200;
    padding: 18px 6%;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    background: rgba(253,246,237,0.96);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem; font-weight: 700;
    color: var(--deep-navy);
    letter-spacing: -0.02em;
    text-decoration: none;
    min-width: 0;
    flex: 1 1 auto;
  }
  .nav-logo span { color: var(--saffron); }
  .nav-cluster {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    flex-shrink: 0;
    flex-wrap: nowrap;
  }
  .nav-back {
    font-size: 0.85rem; font-weight: 500; color: var(--text-mid);
    text-decoration: none;
    transition: color 0.2s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .nav-back:hover { color: var(--saffron); }
  .nav-ic, .nav-cta-ic { width: 16px; height: 16px; flex-shrink: 0; stroke-width: 2.25; }
  .nav-cta {
    background: var(--saffron); color: white !important;
    padding: 9px 22px; border-radius: 50px;
    font-size: 0.85rem; font-weight: 500; text-decoration: none;
    transition: background 0.2s;
    display: inline-flex; align-items: center; gap: 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .nav-cta:hover { background: var(--deep-saffron); }
  .nav-cta-short,
  .nav-cta-tiny { display: none; }

  .nav-toggle {
    display: none;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    margin: -8px -10px -8px 0;
    padding: 0;
    border: none;
    background: transparent;
    color: var(--deep-navy);
    cursor: pointer;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .nav-toggle svg {
    width: 24px;
    height: 24px;
    stroke-width: 2.25;
  }
  .nav-toggle-close { display: none; }
  nav.nav-menu-open .nav-toggle-open { display: none; }
  nav.nav-menu-open .nav-toggle-close { display: block; }

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .nav-drawer {
    display: none;
    list-style: none;
    margin: 0;
    padding: 0;
  }
  @media (min-width: 901px) {
    .nav-toggle { display: none !important; }
    .nav-drawer { display: none !important; }
  }

  a:focus-visible, button:focus-visible {
    outline: 2px solid var(--saffron);
    outline-offset: 2px;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    padding-top: 76px;
  }

  .pdf-toolbar {
    flex-shrink: 0;
    padding: 14px 6%;
    border-bottom: 1px solid var(--border);
    background: rgba(253,246,237,0.5);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .pdf-toolbar h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 2.5vw, 1.35rem);
    font-weight: 600;
    color: var(--deep-navy);
  }
  .pdf-toolbar-note {
    font-size: 0.88rem;
    color: var(--text-mid);
    max-width: 36rem;
    line-height: 1.5;
  }
  .pdf-toolbar a.link-inline {
    color: var(--saffron);
    font-weight: 500;
    text-decoration: none;
  }
  .pdf-toolbar a.link-inline:hover { text-decoration: underline; }

  .pdf-frame-wrap {
    flex: 1;
    min-height: 0;
    background: #e8e4dc;
  }
  .pdf-frame {
    width: 100%;
    height: 100%;
    min-height: calc(100vh - 76px - 56px);
    border: none;
    display: block;
  }

  @media (max-width: 900px) {
    nav {
      flex-wrap: nowrap;
      align-items: center;
      padding: 12px 4%;
      gap: 8px;
    }
    .nav-logo {
      flex: 1 1 auto;
      min-width: 0;
      font-size: clamp(0.9rem, 3.5vw, 1.1rem);
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .nav-back { display: none; }
    .nav-cluster {
      position: relative;
      z-index: 2;
      gap: 4px;
      background: rgba(253,246,237,0.96);
      flex-shrink: 0;
    }
    .nav-toggle { display: flex; }
    .nav-cta {
      padding: 9px 12px;
      font-size: 0.76rem;
      gap: 5px;
    }
    .nav-cta-full { display: none; }
    .nav-cta-short { display: inline; }
    .nav-cta-tiny { display: none; }
    .nav-drawer {
      display: none;
      position: fixed;
      inset: 0;
      min-height: 100vh;
      min-height: 100dvh;
      padding: max(88px, env(safe-area-inset-top, 0px) + 72px) 8%
        max(2rem, env(safe-area-inset-bottom, 0px) + 16px);
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      background: rgba(253,246,237,0.98);
      z-index: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .nav-drawer li { border-bottom: 1px solid var(--border); }
    .nav-drawer li:last-child { border-bottom: none; }
    .nav-drawer a {
      display: block;
      padding: 1rem 0;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-mid);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-drawer a:hover { color: var(--saffron); }
    .nav-drawer a.nav-drawer-cta {
      margin-top: 0.5rem;
      padding: 14px 22px;
      text-align: center;
      border-radius: 50px;
      background: var(--saffron);
      color: white !important;
      border-bottom: none;
    }
    .nav-drawer a.nav-drawer-cta:hover {
      background: var(--deep-saffron);
      color: white !important;
    }
    nav.nav-menu-open .nav-drawer { display: flex; }
    .pdf-toolbar { padding: 12px 4%; }
    .pdf-frame { min-height: calc(100dvh - 76px - 72px); }
  }

  @media (max-width: 400px) {
    .nav-cta-short { display: none !important; }
    .nav-cta-tiny { display: inline; }
  }
  @media (max-width: 340px) {
    .nav-cta-tiny { display: none !important; }
    .nav-cta .nav-cta-ic { width: 20px; height: 20px; }
    .nav-cta { padding: 10px 11px; gap: 0; }
  }
</style>
</head>
<body>

<nav aria-label="Document viewer" id="doc-site-nav">
  <a href="index.html" class="nav-logo">Nurture <span>with</span> Culture</a>
  <div class="nav-cluster">
    <a href="index.html" class="nav-back"><i data-lucide="arrow-left" class="nav-ic" aria-hidden="true"></i><span class="nav-back-label"> Main overview</span></a>
    <a href="resources/Nurture-with-Culture.pdf" class="nav-cta" download="Nurture-with-Culture.pdf" aria-label="Download program PDF"><i data-lucide="download" class="nav-cta-ic" aria-hidden="true"></i><span class="nav-cta-full">Download PDF</span><span class="nav-cta-short">Download</span><span class="nav-cta-tiny">PDF</span></a>
    <button type="button" class="nav-toggle" id="doc-nav-toggle" aria-expanded="false" aria-controls="doc-nav-drawer">
      <span class="visually-hidden">Open menu</span>
      <i data-lucide="menu" class="nav-toggle-open" aria-hidden="true"></i>
      <i data-lucide="x" class="nav-toggle-close" aria-hidden="true"></i>
    </button>
  </div>
  <ul class="nav-drawer" id="doc-nav-drawer">
    <li><a href="index.html">Main program overview</a></li>
    <li><a href="schools.html">For schools</a></li>
    <li><a href="resources/Nurture-with-Culture.pdf" class="nav-drawer-cta" download="Nurture-with-Culture.pdf">Download PDF</a></li>
  </ul>
</nav>

<main>
  <div class="pdf-toolbar">
    <h1>Program document</h1>
    <p class="pdf-toolbar-note">
      View the PDF below, or <a class="link-inline" href="resources/Nurture-with-Culture.pdf" download="Nurture-with-Culture.pdf">download a copy</a>. If the preview does not load in your browser, use download or open the file locally.
    </p>
  </div>
  <div class="pdf-frame-wrap">
    <iframe
      class="pdf-frame"
      title="Nurture with Culture program document (PDF)"
      src="resources/Nurture-with-Culture.pdf"
    ></iframe>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>
  if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
<script>
  (function () {
    var nav = document.getElementById('doc-site-nav');
    var toggle = document.getElementById('doc-nav-toggle');
    var drawer = document.getElementById('doc-nav-drawer');
    if (!nav || !toggle || !drawer) return;
    var mq = window.matchMedia('(max-width: 900px)');
    function setOpen(open) {
      nav.classList.toggle('nav-menu-open', open);
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      document.body.style.overflow = open ? 'hidden' : '';
    }
    toggle.addEventListener('click', function () {
      setOpen(!nav.classList.contains('nav-menu-open'));
    });
    drawer.querySelectorAll('a').forEach(function (a) {
      a.addEventListener('click', function () {
        if (mq.matches) setOpen(false);
      });
    });
    mq.addEventListener('change', function (e) {
      if (!e.matches) setOpen(false);
    });
  })();
</script>
</body>
</html>
